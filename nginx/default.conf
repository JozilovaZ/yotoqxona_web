server {
    listen 80;
    server_name bekendchi.uz www.bekendchi.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bekendchi.uz www.bekendchi.uz;

    ssl_certificate /etc/letsencrypt/live/bekendchi.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bekendchi.uz/privkey.pem;

    client_max_body_size 20M;

    # Docker DNS resolver — har safar yangi IP oladi
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        set $upstream http://web:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
