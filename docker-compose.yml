version: "3.8"

services:
  web:
    build: .
    container_name: yotoqxona_web
    restart: always
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    depends_on: []

  nginx:
    image: nginx:alpine
    container_name: yotoqxona_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_files:/app/staticfiles
      - media_files:/app/media
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    container_name: yotoqxona_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  static_files:
  media_files:
  sqlite_data:
  certbot_www:
  certbot_conf:
