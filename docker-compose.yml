services:
  web:
    build: .
    container_name: yotoqxona_web
    restart: always
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings

  nginx:
    image: nginx:alpine
    container_name: yotoqxona_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - web

  bot:
    build: .
    container_name: yotoqxona_bot
    restart: always
    entrypoint: []
    command: python manage.py run_telegram_bot
    volumes:
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    container_name: yotoqxona_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  sqlite_data:
  certbot_conf:
  certbot_www:
