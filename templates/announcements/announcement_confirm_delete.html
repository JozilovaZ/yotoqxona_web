{% extends 'base.html' %}

{% block title %}E'lonni o'chirish{% endblock %}
{% block header %}E'lonni o'chirish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card p-4 text-center">
            <i class="fas fa-trash fa-3x mb-3" style="color:#dc3545;"></i>
            <h5 class="fw-bold">Rostdan o'chirmoqchimisiz?</h5>
            <p class="text-muted mb-4">"{{ object.title }}" e'lonini o'chirish</p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-3 justify-content-center">
                    <button type="submit" class="btn" style="background:#dc3545;color:#fff;border-radius:10px;font-weight:700;">
                        <i class="fas fa-trash me-1"></i> O'chirish
                    </button>
                    <a href="{% url 'announcements:list' %}" class="btn btn-outline-primary">Bekor qilish</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
