{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 text-center">
                    <div class="text-danger mb-3">
                        <i class="fas fa-exclamation-triangle fa-4x"></i>
                    </div>
                    <h4>O'chirishni tasdiqlaysizmi?</h4>
                    <p class="text-muted">Siz haqiqatdan ham <strong>{{ object.username }}</strong> foydalanuvchisini o'chirmoqchimisiz? Bu amalni qaytarib bo'lmaydi.</p>

                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-2">
                            <a href="{% url 'accounts:user_list' %}" class="btn btn-light px-4">Yo'q, qaytish</a>
                            <button type="submit" class="btn btn-danger px-4 shadow-sm">Ha, o'chirilsin</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
